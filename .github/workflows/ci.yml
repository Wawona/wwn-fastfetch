name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  patch-anchors:
    name: verify fastfetch patch anchors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python3 .github/scripts/verify-fastfetch-ios-patches.py

  eval:
    name: flake eval (instantiation)
    runs-on: macos-15
    needs: patch-anchors
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - run: nix eval .#registryFragment --apply builtins.attrNames
      - run: |
          nix eval --raw .#packages.aarch64-darwin.fastfetch-ios.drvPath
          nix eval --raw .#packages.aarch64-darwin.fastfetch-android.drvPath

  build-ios:
    name: build fastfetch (Apple mobile)
    runs-on: macos-15
    needs: eval
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true
      - run: nix build .#packages.aarch64-darwin.fastfetch-ios -L

  build-android:
    name: build fastfetch (Android)
    runs-on: macos-15
    needs: eval
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            sandbox = relaxed
            allow-import-from-derivation = true
      - run: nix build .#packages.aarch64-darwin.fastfetch-android -L
